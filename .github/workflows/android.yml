name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: |
          docker run --rm \
            -e BUILDOZER_WARN_ON_ROOT=0 \
            -v ${{ github.workspace }}:/home/user/app \
            -w /home/user/app \
            ghcr.io/kivy/buildozer \
            buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
