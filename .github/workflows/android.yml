name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK
        run: |
          docker run --rm \
          -v ${{ github.workspace }}:/home/user/app \
          -w /home/user/app \
          ghcr.io/kivy/buildozer:latest \
          buildozer android debug
