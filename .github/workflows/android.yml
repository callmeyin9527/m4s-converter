name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK
        run: |
          docker run --rm \
          --user 1000:1000 \
          -v ${{ github.workspace }}:/home/user/app \
          -w /home/user/app \
          ghcr.io/kivy/buildozer:latest \
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: m4s-apk
          path: bin/*.apk
